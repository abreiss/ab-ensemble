# Test configuration. Mirrors the minimal main config but disables the
# DynamoDB table auto-create runner so a Spring context (e.g. @SpringBootTest
# contextLoads, @WebMvcTest slices) can start without a live DynamoDB.
# Integration tests (*IT) build their own client against TestContainers and
# drive table setup explicitly.
server:
  port: 8080

spring:
  application:
    name: ensemble

ensemble:
  dynamodb:
    endpoint: http://localhost:8000
    region: us-east-1
    table-name: ensemble-items
    outfits-table-name: ensemble-outfits
    users-table-name: ensemble-users
    auto-create-table: false
  migration:
    # Keep the one-time unowned-data purge (spec #15) off in tests so a Spring
    # context never fires the runner against a non-existent DynamoDB. (The record
    # default is already false; set here explicitly to document the guarantee.)
    purge-unowned: false
  photos:
    dir: build/test-photos
  security:
    # Dummy value, never a real secret — used only so context/slice tests can mint
    # and verify tokens without needing ENSEMBLE_PASSCODE in the environment.
    passcode: test-passcode
    session-secret: test-session-secret
    session-ttl: PT12H
  usage:
    daily-limit: 100
