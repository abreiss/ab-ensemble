server:
  port: 8080

spring:
  application:
    name: ensemble
  config:
    # Load local dev secrets/vars from a git-ignored .env (parsed as properties).
    # `optional:` = no error when the file is absent (CI, prod, fresh clone).
    import: "optional:file:.env[.properties]"
  servlet:
    multipart:
      # Cap upload size so a huge/malicious image cannot exhaust memory on decode.
      max-file-size: 10MB
      max-request-size: 12MB

ensemble:
  dynamodb:
    # Local dev points at DynamoDB Local (docker compose up -d dynamodb).
    endpoint: http://localhost:8000
    region: us-east-1
    table-name: ensemble-items
    # Create the table on startup if absent. Disabled in tests (see
    # src/test/resources/application.yml) so context tests need no live DynamoDB.
    auto-create-table: true
  photos:
    # Base directory for LocalDiskPhotoStorage (git-ignored).
    dir: ./data/photos
    # Reject uploads whose decoded pixel count exceeds this, so a small but highly
    # compressed "decompression bomb" cannot blow up memory. ~50MP >> any phone camera.
    max-upload-pixels: 50000000
  anthropic:
    # API key, supplied via ENSEMBLE_ANTHROPIC_API_KEY (from the git-ignored .env
    # file above, or the process environment). Empty when unset -> normalized to
    # null -> the client falls back to the SDK's own ANTHROPIC_API_KEY resolution.
    # The key is never committed (the .env file is git-ignored).
    api-key: ${ENSEMBLE_ANTHROPIC_API_KEY:}
    # Vision tagging is pinned to Haiku 4.5.
    model: claude-haiku-4-5
    # Stylist reasoning is pinned to Sonnet 5 (separate from the Haiku tagging model).
    stylist-model: claude-sonnet-5
    # Bounded per-request timeout; a hung call degrades to the tagging fallback.
    timeout: 30s
  security:
    # Shared demo passcode, supplied via ENSEMBLE_PASSCODE (from the git-ignored .env
    # file above, or the process environment). Blank/unset -> the gate is effectively
    # closed (every /api/auth attempt is rejected). Never committed.
    passcode: ${ENSEMBLE_PASSCODE:}
    # HMAC key for session tokens. Blank/unset -> derived from the passcode, so a
    # single env var is enough to run locally.
    session-secret: ${ENSEMBLE_SESSION_SECRET:}
    session-ttl: PT12H
  usage:
    # Global daily cap on Claude-backed calls (POST /api/style, POST /api/items/tag).
    # Counted before the call so a failed/timed-out upstream call still consumes
    # budget; resets implicitly at the UTC calendar-day boundary.
    daily-limit: 100
