# Lightweight local commit gates — fast checks only. Full coverage (JaCoCo)
# and the container build run in CI, not here. See docs/PRECOMMIT.md.
minimum_pre_commit_version: "3.0.0"

repos:
  # General hygiene + a private-key guard (fast, file-scoped).
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: check-merge-conflict
      - id: detect-private-key

  # Secret scan: block accidental commit of an Anthropic API key.
  - repo: local
    hooks:
      - id: block-anthropic-keys
        name: Block committed Anthropic API keys
        entry: 'sk-ant-[A-Za-z0-9_-]{20,}'
        language: pygrep
        types: [text]

      # Secret scan: block accidental commit of an AWS access key (mirrors the
      # Anthropic guard). Catches the access-key id (AKIA...) and a populated
      # aws_secret_access_key assignment. The AWS_ACCESS.md doc and the spec-16
      # proof transcripts intentionally show AWS's published example key (the
      # AKIA...EXAMPLE placeholder) in redacted output, so those paths are
      # allowlisted; a real key anywhere else is blocked.
      - id: block-aws-keys
        name: Block committed AWS access keys
        entry: 'AKIA[0-9A-Z]{16}|aws_secret_access_key\s*=\s*[A-Za-z0-9/+=]{40}'
        language: pygrep
        types: [text]
        exclude: '^docs/(AWS_ACCESS\.md|specs/16-spec-scoped-iam-identity/.*)$'

      # Fast backend unit tests (no Node toolchain needed).
      - id: backend-tests
        name: Backend tests (gradle, -PskipFrontend)
        entry: ./gradlew test -PskipFrontend --quiet
        language: system
        pass_filenames: false
        files: '\.(java|gradle)$|^gradle/'

      # Frontend unit tests.
      - id: frontend-tests
        name: Frontend tests (vitest)
        entry: bash -c 'cd frontend && npm run test -- --run'
        language: system
        pass_filenames: false
        files: '^frontend/.*\.(ts|tsx|json|html|css)$'

      # Frontend lint.
      - id: frontend-lint
        name: Frontend lint (eslint)
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        pass_filenames: false
        files: '^frontend/.*\.(ts|tsx)$'
